<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TL Pipes – Puzzle Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* Allow the page to scroll horizontally on narrow viewports so that the
       level editor's three-column layout never clips off-screen. */
    html { min-width: min-content; }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      margin: 20px 0 16px;
      font-size: 2rem;
      letter-spacing: 2px;
    }

    /* ── Level-select screen ─────────────────────────────────────── */
    #level-select {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 520px;
      padding: 0 16px 32px;
    }

    #level-select h2 {
      font-size: 1.4rem;
      color: #7ed321;
      margin-bottom: 8px;
    }

    #level-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .level-btn {
      padding: 14px 20px;
      font-size: 1rem;
      background: #16213e;
      color: #eee;
      border: 2px solid #4a90d9;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
    }
    .level-btn:hover:not(:disabled) { background: #1e2a4a; }
    .level-btn.completed { border-color: #7ed321; }
    .level-btn.locked    { border-color: #555; color: #777; cursor: default; }

    /* ── Play screen ─────────────────────────────────────────────── */
    #play-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding-bottom: 24px;
    }

    #level-header {
      font-size: 1rem;
      color: #aaa;
      letter-spacing: 0.5px;
      text-align: center;
    }

    #play-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 16px;
    }

    #game-canvas {
      border: 3px solid #4a90d9;
      border-radius: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Inventory bar ────────────────────────────────────────────── */
    #inventory-bar {
      min-width: 160px;
      background: #16213e;
      border: 2px solid #4a90d9;
      border-radius: 6px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .inv-title {
      font-size: 0.9rem;
      color: #7ed321;
      text-align: center;
      letter-spacing: 1px;
    }

    .inv-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0d1a30;
      border: 2px solid #2a3a5e;
      border-radius: 4px;
      padding: 6px 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .inv-item:hover:not(.depleted):not(.negative) { border-color: #4a90d9; background: #1e2a4a; }
    .inv-item.selected  { border-color: #f0c040; background: #2a3a1a; }
    .inv-item.depleted  { opacity: 0.4; cursor: default; }
    .inv-item.negative  { border-color: #8b1a1a; }
    .inv-item.negative:hover { border-color: #e74c3c; background: #2a0a0a; }
    .inv-item.negative .inv-count { color: #e74c3c; }
    .inv-item.gold      { border-color: #b8860b; background: #1e1600; }
    .inv-item.gold:hover:not(.depleted):not(.negative) { border-color: #ffd700; background: #2a2000; }
    .inv-item.gold.selected { border-color: #f0c040; background: #2a2000; }

    @keyframes inv-sparkle {
      0%   { outline: 3px solid rgba(255,215,0,0);   box-shadow: 0 0  0px 0px rgba(255,215,0,0);   }
      30%  { outline: 3px solid rgba(255,215,0,0.9); box-shadow: 0 0 10px 5px rgba(255,215,0,0.7); }
      100% { outline: 3px solid rgba(255,215,0,0);   box-shadow: 0 0  0px 0px rgba(255,215,0,0);   }
    }
    .inv-item.sparkle { animation: inv-sparkle 0.9s ease-out forwards; }
    @keyframes inv-sparkle-red {
      0%   { outline: 3px solid rgba(231,76,60,0);   box-shadow: 0 0  0px 0px rgba(231,76,60,0);   }
      30%  { outline: 3px solid rgba(231,76,60,0.9); box-shadow: 0 0 10px 5px rgba(231,76,60,0.7); }
      100% { outline: 3px solid rgba(231,76,60,0);   box-shadow: 0 0  0px 0px rgba(231,76,60,0);   }
    }
    .inv-item.sparkle-red { animation: inv-sparkle-red 0.9s ease-out forwards; }
    @keyframes inv-sparkle-gray {
      0%   { outline: 3px solid rgba(158,158,158,0);   box-shadow: 0 0  0px 0px rgba(158,158,158,0);   }
      30%  { outline: 3px solid rgba(158,158,158,0.9); box-shadow: 0 0 10px 5px rgba(158,158,158,0.7); }
      100% { outline: 3px solid rgba(158,158,158,0);   box-shadow: 0 0  0px 0px rgba(158,158,158,0);   }
    }
    .inv-item.sparkle-gray { animation: inv-sparkle-gray 0.9s ease-out forwards; }

    .inv-shape { font-size: 0.85rem; }
    .inv-count { font-size: 1.2rem; color: #7ed321; font-weight: bold; }
    .inv-none  { font-size: 0.9rem; color: #888; text-align: center; margin: 0; }

    /* ── Stats box (right panel, above inventory) ────────────────── */
    #right-panel {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #stats-box {
      min-width: 160px;
      width: max-content;
      background: #16213e;
      border: 2px solid #4a90d9;
      border-radius: 6px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: 1.1rem;
      font-weight: bold;
      white-space: nowrap;
    }

    #water-display {
      color: #7ed321;
    }

    .stat-value {
      text-align: right;
    }

    /* ── HUD ──────────────────────────────────────────────────────── */
    #hud {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    #undo-btn,
    #redo-btn,
    #restart-btn {
      padding: 6px 14px;
      font-size: 0.9rem;
      background: #2a2a4a;
      color: #aaa;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
    }
    #undo-btn:hover:not(:disabled),
    #redo-btn:hover:not(:disabled),
    #restart-btn:hover { background: #3a3a5a; color: #eee; }
    #undo-btn:disabled,
    #redo-btn:disabled { opacity: 0.35; cursor: default; }

    #rules-btn,
    #exit-btn {
      padding: 6px 18px;
      font-size: 0.9rem;
      background: #2a2a4a;
      color: #aaa;
      border: 1px solid #555;
      border-radius: 4px;
      cursor: pointer;
    }
    #rules-btn:hover,
    #exit-btn:hover { background: #3a3a5a; color: #eee; }

    /* ── Modal overlay ────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.25);
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    @keyframes modal-fade-in {
      from { opacity: 0; }
      to   { opacity: 0.9; }
    }
    .modal-overlay.fade-in { animation: modal-fade-in 900ms ease-in forwards; }
    #win-modal { opacity: 0.9; }

    .modal-box {
      background: #16213e;
      border: 3px solid #4a90d9;
      border-radius: 10px;
      padding: 32px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 280px;
    }

    .modal-box h2 { font-size: 1.6rem; }
    .modal-box p  { font-size: 0.95rem; color: #aaa; }

    .modal-btn {
      padding: 10px 24px;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-btn:hover { opacity: 0.85; }
    .modal-btn.primary   { background: #4a90d9; color: #fff; }
    .modal-btn.secondary { background: #2a2a4a; color: #aaa; border: 1px solid #555; }

    .modal-actions { display: flex; gap: 12px; justify-content: center; }

    @keyframes modal-sparkle-gold {
      0%   { box-shadow: 0 0  0px  0px rgba(255,215,0,0),   0 0  0px  0px rgba(255,215,0,0);   border-color: #ffd700; }
      15%  { box-shadow: 0 0 22px  9px rgba(255,215,0,0.85),0 0 44px 18px rgba(255,215,0,0.4); border-color: #ffe866; }
      30%  { box-shadow: 0 0  8px  3px rgba(255,215,0,0.3), 0 0 16px  6px rgba(255,215,0,0.1); border-color: #c9a200; }
      55%  { box-shadow: 0 0 28px 12px rgba(255,215,0,0.9), 0 0 56px 22px rgba(255,215,0,0.5); border-color: #ffe866; }
      75%  { box-shadow: 0 0  9px  3px rgba(255,215,0,0.3), 0 0 18px  6px rgba(255,215,0,0.1); border-color: #c9a200; }
      88%  { box-shadow: 0 0 18px  7px rgba(255,215,0,0.65),0 0 36px 14px rgba(255,215,0,0.3); border-color: #ffd700; }
      100% { box-shadow: 0 0  0px  0px rgba(255,215,0,0),   0 0  0px  0px rgba(255,215,0,0);   border-color: #ffd700; }
    }
    @keyframes modal-sparkle-red {
      0%   { box-shadow: 0 0  0px  0px rgba(255,60,60,0),   0 0  0px  0px rgba(255,60,60,0);   border-color: #ff3c3c; }
      15%  { box-shadow: 0 0 22px  9px rgba(255,60,60,0.85),0 0 44px 18px rgba(255,60,60,0.4); border-color: #ff6666; }
      30%  { box-shadow: 0 0  8px  3px rgba(255,60,60,0.3), 0 0 16px  6px rgba(255,60,60,0.1); border-color: #cc2020; }
      55%  { box-shadow: 0 0 28px 12px rgba(255,60,60,0.9), 0 0 56px 22px rgba(255,60,60,0.5); border-color: #ff6666; }
      75%  { box-shadow: 0 0  9px  3px rgba(255,60,60,0.3), 0 0 18px  6px rgba(255,60,60,0.1); border-color: #cc2020; }
      88%  { box-shadow: 0 0 18px  7px rgba(255,60,60,0.65),0 0 36px 14px rgba(255,60,60,0.3); border-color: #ff3c3c; }
      100% { box-shadow: 0 0  0px  0px rgba(255,60,60,0),   0 0  0px  0px rgba(255,60,60,0);   border-color: #ff3c3c; }
    }
    .modal-box.sparkle-gold { animation: modal-sparkle-gold 3s ease-in-out infinite; border-color: #ffd700; }
    .modal-box.sparkle-red  { animation: modal-sparkle-red  3s ease-in-out infinite; border-color: #ff3c3c; }

    @keyframes modal-sparkle-yellow {
      0%   { box-shadow: 0 0  0px  0px rgba(255,210,0,0),   0 0  0px  0px rgba(255,210,0,0);   border-color: #ffd200; }
      15%  { box-shadow: 0 0 22px  9px rgba(255,210,0,0.85),0 0 44px 18px rgba(255,210,0,0.4); border-color: #ffe566; }
      30%  { box-shadow: 0 0  8px  3px rgba(255,210,0,0.3), 0 0 16px  6px rgba(255,210,0,0.1); border-color: #c9a000; }
      55%  { box-shadow: 0 0 28px 12px rgba(255,210,0,0.9), 0 0 56px 22px rgba(255,210,0,0.5); border-color: #ffe566; }
      75%  { box-shadow: 0 0  9px  3px rgba(255,210,0,0.3), 0 0 18px  6px rgba(255,210,0,0.1); border-color: #c9a000; }
      88%  { box-shadow: 0 0 18px  7px rgba(255,210,0,0.65),0 0 36px 14px rgba(255,210,0,0.3); border-color: #ffd200; }
      100% { box-shadow: 0 0  0px  0px rgba(255,210,0,0),   0 0  0px  0px rgba(255,210,0,0);   border-color: #ffd200; }
    }
    .modal-box.sparkle-yellow { animation: modal-sparkle-yellow 3s ease-in-out infinite; border-color: #ffd200; }

    @keyframes modal-sparkle-blue {
      0%   { box-shadow: 0 0  0px  0px rgba(100,180,255,0),   0 0  0px  0px rgba(100,180,255,0);   border-color: #4a90d9; }
      15%  { box-shadow: 0 0 22px  9px rgba(100,180,255,0.85),0 0 44px 18px rgba(100,180,255,0.4); border-color: #74b9ff; }
      30%  { box-shadow: 0 0  8px  3px rgba(100,180,255,0.3), 0 0 16px  6px rgba(100,180,255,0.1); border-color: #2a70b9; }
      55%  { box-shadow: 0 0 28px 12px rgba(100,180,255,0.9), 0 0 56px 22px rgba(100,180,255,0.5); border-color: #74b9ff; }
      75%  { box-shadow: 0 0  9px  3px rgba(100,180,255,0.3), 0 0 18px  6px rgba(100,180,255,0.1); border-color: #2a70b9; }
      88%  { box-shadow: 0 0 18px  7px rgba(100,180,255,0.65),0 0 36px 14px rgba(100,180,255,0.3); border-color: #4a90d9; }
      100% { box-shadow: 0 0  0px  0px rgba(100,180,255,0),   0 0  0px  0px rgba(100,180,255,0);   border-color: #4a90d9; }
    }
    .modal-box.sparkle-blue { animation: modal-sparkle-blue 3s ease-in-out infinite; border-color: #4a90d9; }
  </style>
</head>
<body>
  <h1>🔧 Cool Pipes</h1>

  <!-- ── Level-select screen ────────────────────────────────────── -->
  <div id="level-select">
    <div id="level-list"></div>
  </div>

  <!-- ── Play screen ────────────────────────────────────────────── -->
  <div id="play-screen">
    <div id="level-header"></div>
    <div id="hud">
      <button id="undo-btn" type="button" disabled>↩ Undo</button>
      <button id="redo-btn" type="button" disabled>↪ Redo</button>
      <button id="restart-btn" type="button">↺ Restart</button>
      <button id="rules-btn" type="button">📋 Rules</button>
      <button id="exit-btn" type="button">← Menu</button>
    </div>
    <div id="play-area">
      <canvas id="game-canvas" tabindex="0" aria-label="Pipes puzzle game board"></canvas>
      <div id="right-panel">
        <div id="stats-box">
          <div id="water-display" class="stat-row">
            <span class="stat-label">💧 Water</span>
            <span class="stat-value">–</span>
          </div>
        </div>
        <div id="inventory-bar"></div>
      </div>
    </div>
  </div>

  <!-- ── Win modal ──────────────────────────────────────────────── -->
  <div id="win-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>🎉 You Win!</h2>
      <p>The water reached its destination.</p>
      <p id="win-challenge" style="display:none;font-size:1.1rem;font-weight:bold;color:#e74c3c;letter-spacing:0.05em;"></p>
      <p id="win-water" style="display:none;font-size:1.1rem;font-weight:bold;color:#4fc3f7;letter-spacing:0.05em;"></p>
      <p id="win-stars" style="display:none;font-size:1.3rem;font-weight:bold;color:#f0c040;letter-spacing:0.05em;"></p>
      <div class="modal-actions">
        <button id="win-next-btn"  class="modal-btn primary"   type="button">Next Level ▶</button>
        <button id="win-undo-btn"  class="modal-btn secondary" type="button">↩ Undo Move</button>
        <button id="win-retry-btn" class="modal-btn secondary" type="button">Retry</button>
        <button id="win-menu-btn"  class="modal-btn secondary" type="button">Level Select</button>
      </div>
    </div>
  </div>

  <!-- ── Game-over modal ────────────────────────────────────────── -->
  <div id="gameover-modal" class="modal-overlay">
    <div class="modal-box">
      <h2>💧 Out of Water!</h2>
      <p id="gameover-msg"></p>
      <div class="modal-actions">
        <button id="gameover-undo-btn"  class="modal-btn primary"   type="button">↩ Undo Move</button>
        <button id="gameover-retry-btn" class="modal-btn secondary" type="button">Retry</button>
        <button id="gameover-menu-btn"  class="modal-btn secondary" type="button">Level Select</button>
      </div>
    </div>
  </div>
</body>
</html>
